name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      # P39-F: Security guardrails
      - name: Security guardrails
        run: |
          echo "Checking for service_role leaks..."
          if grep -rn 'service_role\|SERVICE_ROLE\|SUPABASE_SERVICE' app/ lib/ components/ --include="*.ts" --include="*.tsx"; then
            echo "FAIL: service_role found in app code"
            exit 1
          fi
          echo "PASS: No service_role in app code"
